<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportLife - Tienda virtual</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div>
      <h1>SportLife</h1>
      <p>Tu tienda deportiva online</p>
    </div>

    <div class="auth-box">
      <p id="welcome-message">No has iniciado sesión</p>
      <button id="login-btn">Iniciar sesión</button>
      <button id="logout-btn">Cerrar sesión</button>
    </div>
  </header>

  <main class="container">

    <section class="products-section">
      <h2>Productos</h2>

      <div class="products-grid" id="products-container">
        <!-- Aquí se cargarán los productos desde JavaScript -->
      </div>
    </section>

    <aside class="cart-section">
      <h2>Carrito de compras</h2>
      <div id="cart-container">
        <p>Tu carrito está vacío.</p>
      </div>
      <h3 id="cart-total">Total: $0</h3>
    </aside>

  </main>

  <section class="checkout-section">
    <h2>Formulario de pago y despacho</h2>

    <form id="checkout-form">
      <label for="fullName">Nombre completo</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="address">Dirección de envío</label>
      <input type="text" id="address" name="address" required>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Teléfono</label>
      <input type="text" id="phone" name="phone" required>

      <button type="submit">Finalizar compra</button>
    </form>
  </section>

  <section class="confirmation-section" id="confirmation-section">
    <h2>Compra confirmada</h2>
    <div id="confirmation-message">
      <!-- Aquí aparecerá el resumen final -->
    </div>
  </section>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
<script src="app.js"></script>
</body>
</html>
